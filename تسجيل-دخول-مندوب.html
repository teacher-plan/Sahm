<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توصيل - تسجيل دخول المندوبين</title>
<style>
:root { --primary:#0f766e; --primary-hover:#0d9488; --primary-light:#ccfbf1; --text:#0f172a; --text-muted:#64748b; --bg:#faf8f5; --card-bg:rgba(255,255,255,0.82); --border:#e2e8f0; --shadow:0 4px 16px rgba(0,0,0,0.06); --radius:16px; --radius-sm:10px; --transition:0.3s; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); background-image:radial-gradient(#e2e8f0 0.8px,transparent 0.8px); background-size:24px 24px; color:var(--text); line-height:1.7; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.header { background:linear-gradient(135deg,#0f766e,#0d9488); padding:20px; text-align:center; color:white; position:fixed; top:0; left:0; right:0; z-index:10; }
.header h1 { font-size:20px; }
.glass { background:var(--card-bg); backdrop-filter:blur(16px); border-radius:var(--radius); border:1px solid rgba(255,255,255,0.6); box-shadow:var(--shadow); padding:32px; width:100%; max-width:420px; margin:80px 16px 20px; animation:fadeInUp 0.5s ease-out; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.glass h2 { font-size:20px; text-align:center; margin-bottom:8px; }
.glass p { text-align:center; color:var(--text-muted); font-size:13px; margin-bottom:20px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; font-weight:600; margin-bottom:4px; color:var(--text-muted); }
.form-group input, .form-group select { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; }
.form-group input:focus, .form-group select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 4px rgba(15,118,110,0.1); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn { width:100%; padding:13px; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition); }
.btn-primary { background:linear-gradient(135deg,#0f766e,#0d9488); color:white; }
.btn-primary:hover { opacity:0.9; }
.alert-box { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:12px; text-align:center; }
.alert-box.good { background:#d1fae5; color:#065f46; }
.alert-box.bad { background:#fef2f2; color:#991b1b; }
.hidden { display:none !important; }
.step-indicator { display:flex; justify-content:center; gap:8px; margin-bottom:16px; }
.step-dot { width:10px; height:10px; border-radius:50%; background:var(--border); }
.step-dot.active { background:var(--primary); width:28px; border-radius:5px; }
@media(max-width:480px){ .glass{padding:20px;margin:70px 12px 12px} .form-row{grid-template-columns:1fr} }
</style>
</head>
<body>

<div class="header"><h1>🚚 توصيل - منصة المندوبين</h1></div>

<div class="glass" id="loginBox">
  <h2>🔐 تسجيل دخول المندوب</h2>
  <p>أدخل اسم المستخدم وكلمة المرور</p>
  <div id="loginAlert"></div>
  <div class="form-group">
    <label>👤 اسم المستخدم</label>
    <input type="text" id="loginUser" placeholder="أدخل اسم المستخدم">
  </div>
  <div class="form-group">
    <label>🔑 كلمة المرور</label>
    <input type="password" id="loginPass" placeholder="أدخل كلمة المرور">
  </div>
  <button class="btn btn-primary" onclick="courierLogin()">دخول</button>
  <p style="margin-top:14px;font-size:12px;color:var(--text-muted);">لا تملك حساب؟ تواصل مع المشرف</p>
</div>

<div class="glass hidden" id="profileBox">
  <h2>📋 إعداد الملف الشخصي</h2>
  <p>هذه المرة الأولى لك، الرجاء تعبئة بياناتك</p>
  <div class="step-indicator"><div class="step-dot"></div><div class="step-dot active"></div><div class="step-dot"></div></div>
  <div id="profileAlert"></div>
  <div class="form-group">
    <label>الاسم الكامل</label>
    <input type="text" id="pName" placeholder="مثال: أحمد بن سلام">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>رقم الهاتف</label>
      <input type="tel" id="pPhone" placeholder="9XXXXXXXX">
    </div>
    <div class="form-group">
      <label>المحافظة</label>
      <select id="pGov"></select>
    </div>
  </div>
  <div class="form-group">
    <label>وسيلة النقل</label>
    <select id="pVehicle">
      <option value="سيارة">🚗 سيارة</option>
      <option value="دراجة نارية">🏍️ دراجة نارية</option>
      <option value="دراجة هوائية">🚲 دراجة هوائية</option>
      <option value="شاحنة صغيرة">🛻 شاحنة صغيرة</option>
      <option value="دراجة كهربائية">🛴 دراجة كهربائية</option>
      <option value="أخرى">أخرى</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="saveProfile()">💾 حفظ البيانات</button>
</div>

<script>
const SUPABASE_URL='https://qwnwrbbsozegbhwsktsa.supabase.co'
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3bndyYmJzb3plZ2Jod3NrdHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjMzMzAsImV4cCI6MjA5NzYzOTMzMH0.UnvN3VHtoSz-DRFCMvnhJ6feoi4ao41sDB_a3GRn8WE'
const SB_HEADERS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Accept':'application/json'}
const OMAN_DATA={"مسقط":["مسقط","مطرح","العامرات","بوشر","السيب","قريات"],"ظفار":["صلالة","طاقة","مرباط","رخيوت","ثمريت","ضلكوت","المزيونة","مقشن","شليم وجزر الحلانيات","سدح"],"مسندم":["خصب","دبا","بخاء","مدحاء"],"البريمي":["البريمي","محضة","السنينة"],"الداخلية":["نزوى","سمائل","بهلا","أدم","الحمراء","منح","إزكي","بدبد","الجبل الأخضر"],"الظاهرة":["عبري","ينقل","ضنك"],"شمال الباطنة":["صحار","شناص","لوى","صحم","الخابورة","السويق"],"جنوب الباطنة":["الرستاق","المصنعة","بركاء","نخل","وادي المعاول","العوابي"],"شمال الشرقية":["إبراء","المضيبي","بدية","القابل","وادي بني خالد","دماء والطائيين","سناو"],"جنوب الشرقية":["صور","جعلان بني بو علي","جعلان بني بو حسن","الكامل والوافي","مصيرة"],"الوسطى":["هيما","محوت","الدقم","الجازر"]}
let currentCourierId=null

async function sbFetch(path,opts={}){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:{...SB_HEADERS,...opts.headers},...opts})
    if(!r.ok)throw new Error(r.statusText)
    if(opts.method==='PATCH'||opts.method==='DELETE')return{data:null,error:null}
    return{data:await r.json(),error:null}
  }catch(e){return{data:null,error:e}}
}

function showAlert(id,msg,type){
  document.getElementById(id).innerHTML='<div class="alert-box '+type+'">'+msg+'</div>'
  setTimeout(()=>{const a=document.querySelector('#'+id+' .alert-box');if(a)a.remove()},4000)
}

// Populate governorate dropdown
const govSelect=document.getElementById('pGov')
Object.keys(OMAN_DATA).forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;govSelect.appendChild(o)})

async function courierLogin(){
  const username=document.getElementById('loginUser').value.trim()
  const password=document.getElementById('loginPass').value.trim()
  if(!username||!password){showAlert('loginAlert','❌ أدخل اسم المستخدم وكلمة المرور','bad');return}
  const{data}=await sbFetch('couriers?username=eq.'+encodeURIComponent(username)+'&password=eq.'+encodeURIComponent(password)+'&select=*')
  if(!data||data.length===0){showAlert('loginAlert','❌ اسم المستخدم أو كلمة المرور خطأ','bad');return}
  const courier=data[0]
  if(!courier.is_active){showAlert('loginAlert','❌ حسابك موقوف، تواصل مع المشرف','bad');return}
  currentCourierId=courier.id
  sessionStorage.setItem('courier_id',courier.id)
  sessionStorage.setItem('courier_name',courier.name)
  sessionStorage.setItem('courier_username',courier.username)
  if(courier.has_profile){
    window.location.href='طلبيات-المندوبين.html'
  }else{
    document.getElementById('loginBox').classList.add('hidden')
    document.getElementById('profileBox').classList.remove('hidden')
    document.getElementById('pName').focus()
  }
}

async function saveProfile(){
  const name=document.getElementById('pName').value.trim()
  const phone=document.getElementById('pPhone').value.trim()
  const gov=document.getElementById('pGov').value
  const vehicle=document.getElementById('pVehicle').value
  if(!name||!phone||!gov){showAlert('profileAlert','❌ يرجى تعبئة جميع الحقول','bad');return}
  const btn=document.querySelector('#profileBox .btn');btn.disabled=true;btn.textContent='⏳ جاري الحفظ...'
  await sbFetch('couriers?id=eq.'+currentCourierId,{method:'PATCH',body:JSON.stringify({name,phone,governorate:gov,vehicle_type:vehicle,has_profile:true})})
  sessionStorage.setItem('courier_name',name)
  showAlert('profileAlert','✅ تم حفظ البيانات! جاري التحويل...','good')
  setTimeout(()=>{window.location.href='طلبيات-المندوبين.html'},800)
}

// Check if already logged in
const cid=sessionStorage.getItem('courier_id')
if(cid){window.location.href='طلبيات-المندوبين.html'}
</script>
</body>
</html>
